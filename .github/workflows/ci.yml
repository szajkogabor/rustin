name: CI

on:
  push:
    branches: [ "**" ]
    tags: [ "*" ]
  pull_request:

jobs:
  check:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --all-targets --all-features

  verify-tag-on-main:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit belongs to main
        id: check
        shell: bash
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  build-release-binaries:
    needs: verify-tag-on-main
    if: startsWith(github.ref, 'refs/tags/') &&
      needs.verify-tag-on-main.outputs.on_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          tag_name="${GITHUB_REF_NAME}"
          asset_base="rustin-${tag_name}-${{ matrix.target }}"
          bin_path="target/${{ matrix.target }}/release/rustin"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            bin_path="${bin_path}.exe"
            cp "$bin_path" "dist/rustin.exe"
            (cd dist && 7z a "${asset_base}.zip" "rustin.exe")
            rm -f dist/rustin.exe
          else
            cp "$bin_path" "dist/rustin"
            tar -C dist -czf "dist/${asset_base}.tar.gz" "rustin"
            rm -f dist/rustin
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release-assets
          path: dist/*
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/') &&
      needs.verify-tag-on-main.outputs.on_main == 'true'
    needs:
      - verify-tag-on-main
      - build-release-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
